name: Schedule Tests

on:
  schedule:
    - cron: '0/15 * * * 1-5'

jobs:
  RunTest:
    runs-on: ubuntu-22.04   # evita quebra futura com ubuntu-latest

    steps:
      # 1 Clonar projeto
      - name: Checkout
        uses: actions/checkout@v4

      # 2 Instalar Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3️ Instalar Chrome
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      # 4 Verificar versão do Chrome
      - name: Check Chrome Version
        run: google-chrome --version

      # 5 Instalar  ChromeDriver
      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      # 6 Executar testes
      - name: Run Tests
        run: mvn clean test -Dtest=RunCucumberTest -Dbrowser=chrome-ci

      # 7 Instalar Allure CLI (via release oficial)
      - name: Install Allure
        if: always()
        run: |
          ALLURE_VERSION=2.29.0
          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxvf allure-${ALLURE_VERSION}.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      # 8 Garantir que pasta exista
      - name: Ensure Allure Results Folder
        if: always()
        run: mkdir -p target/allure-results

      # 9 Gerar relatório
      - name: Generate Allure Report
        if: always()
        run: allure generate target/allure-results --clean -o target/allure-report

      # 10 Upload do relatório como artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Allure-Report
          path: target/allure-report
          retention-days: 5