name: Smoke Tests - PR

on:
  pull_request:
    branches: [ master ]

jobs:
  RunTest:
    runs-on: ubuntu-latest

    steps:
      # Clonar projeto
      - name: Clonar projeto
        uses: actions/checkout@v4

      # Instalar o java
      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Instalar o chrome
      - name: Instalar o Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Verificar versão do Chrome
        run: google-chrome --version

      # Instalar o chrome driver
      - name: Instalar o ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      # Executar os testes
      - name: Run Test
        run: mvn clean test -Dtest=RunCucumberTest -Dbrowser=chrome-ci




      - name: Instalar Allure CLI
        run: |
          sudo apt-add-repository ppa:qameta/allure -y
          sudo apt-get update
          sudo apt-get install allure -y
          
          
     

      - name: Gerar relatório Allure
        run: allure generate target/allure-results -o target/allure-report --clean

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
             name: Allure-Report
             path: target/allure-report
             retention-days: 5