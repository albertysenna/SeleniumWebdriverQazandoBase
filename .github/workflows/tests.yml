name: Smoke Tests - PR

on:
  pull_request:
    branches: [ master ]

jobs:
  RunTest:
    runs-on: ubuntu-latest

    steps:
      # Clonar projeto
      - name: Clonar projeto
        uses: actions/checkout@v4

      # Instalar o java
      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Instalar o chrome
      - name: Instalar o Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Verificar versão do Chrome
        run: google-chrome --version

      # Instalar o chrome driver
      - name: Instalar o ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      # Executar os testes
      - name: Run Test
        run: mvn clean test -Dtest=RunCucumberTest -Dbrowser=chrome-ci

      # Gerar o relatório

      # Adicionar o Passo de Arquivamento (Artifact)
      - name: Archive Extent Report
        uses: actions/upload-artifact@v4
        if: always() # Garante que o relatório seja anexado mesmo se houver falha nos testes
        with:
            name: Extent-Test-Report
            path: target/extent-report.html
            retention-days: 5 # Mantém o arquivo por 5 dias (ajuste conforme necessário)