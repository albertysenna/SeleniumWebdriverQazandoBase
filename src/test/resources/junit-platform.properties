# Caminho do glue: pacotes onde o Cucumber vai buscar os steps e hooks
cucumber.glue=steps,hooks

# Plugins a serem usados pelo Cucumber:
# - pretty: imprime os cenários e steps no console de forma legível
# - io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm: gera relatórios para o Allure 7
cucumber.plugin=pretty,io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm

# Diretório onde o Allure vai armazenar os resultados
allure.results.directory=target/allure-results

# Desativa execução paralela do JUnit Jupiter
# Evita que múltiplos containers/threads executem features simultaneamente
# Garante que cada cenário execute de forma isolada, evitando duplicação ou conflitos de browser/driver.
junit.jupiter.execution.parallel.enabled=false

# Tag default para executar cenários
# Apenas cenários marcados com essa tag serão executados
# Pode ser sobrescrito dinamicamente via linha de comando/ via Maven
# Exemplo: mvn clean test -Dcucumber.filter.tags="@smoke"
cucumber.filter.tags=@run